name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão a publicar (ex: 0.1.1). Deixe vazio para usar a versão atual do package.json'
        required: false
        type: string
      tag:
        description: 'dist-tag do npm (latest, next, beta)'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@agendaai'

      - name: Install dependencies
        run: npm ci

      - name: Bump version (manual run)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public --provenance --tag ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
